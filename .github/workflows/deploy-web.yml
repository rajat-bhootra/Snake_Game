name: Deploy Web Game

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Pygbag
        run: python -m pip install --upgrade pip pygbag

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Convert Audio to OGG for Web
        run: |
          set -euo pipefail
          for f in assets/sound/*.mp3; do
            out="${f%.mp3}.ogg"
            ffmpeg -y -i "$f" -c:a libvorbis -q:a 4 "$out"
          done

      - name: Build Web Package
        run: python -m pygbag --build --ume_block 0 --app_name SnakeGame --cdn https://pygame-web.github.io/archives/0.9/ .

      - name: Verify Web Build Output
        run: |
          ls -la build
          ls -la build/web

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
